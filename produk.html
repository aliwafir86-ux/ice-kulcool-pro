<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produk Kami - Ice Kulcool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 p-4 md:p-6 flex justify-between items-center">
        <a href="index.html" class="flex items-center text-purple-900 font-bold hover:text-purple-700 transition-all">
            <i class="fa-solid fa-arrow-left mr-2"></i> 
            <span data-key="back-btn">KEMBALI</span>
        </a>
        <h1 data-key="prod-title" class="text-lg md:text-xl font-extrabold text-purple-900 tracking-tighter uppercase">SEMUA PRODUK</h1>
        <div class="w-10"></div> </nav>

    <header class="py-12 px-6 text-center bg-gradient-to-b from-purple-50 to-slate-50">
        <h2 data-key="prod-hero" class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-2">Varian Rasa Lumer</h2>
        <p data-key="prod-desc" class="text-slate-500">Pilih rasa favoritmu, nikmati sensasi cokelatnya!</p>
    </header>

    <section class="pb-20 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            
            <div class="bg-white p-3 md:p-4 rounded-3xl shadow-sm border border-gray-100 hover:shadow-xl transition-all group">
                <div class="overflow-hidden rounded-2xl mb-4">
                    <img src="piscok 10.png" class="w-full h-40 md:h-52 object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <h4 class="font-bold text-slate-800 text-lg">Piscok Original</h4>
                <p class="text-slate-500 text-xs md:text-sm leading-tight mb-3">Cokelat premium lumer di dalam.</p>
                <div class="flex justify-between items-center">
                    <span class="text-purple-700 font-extrabold text-lg">Rp 2k</span>
                    <button class="bg-purple-100 p-2 rounded-full text-purple-700 hover:bg-purple-700 hover:text-white transition-colors">
                        <i class="fa-solid fa-cart-plus"></i>
                    </button>
                </div>
            </div>

            <div class="bg-white p-3 md:p-4 rounded-3xl shadow-sm border border-gray-100 hover:shadow-xl transition-all group">
                <div class="overflow-hidden rounded-2xl mb-4">
                    <img src="https://images.unsplash.com/photo-1551024601-bec78acc704b?auto=format&fit=crop&w=500" class="w-full h-40 md:h-52 object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <h4 class="font-bold text-slate-800 text-lg">Piscok Keju</h4>
                <p class="text-slate-500 text-xs md:text-sm leading-tight mb-3">Paduan manis cokelat & gurih keju.</p>
                <div class="flex justify-between items-center">
                    <span class="text-purple-700 font-extrabold text-lg">Rp 2k</span>
                    <button class="bg-purple-100 p-2 rounded-full text-purple-700 hover:bg-purple-700 hover:text-white transition-colors">
                        <i class="fa-solid fa-cart-plus"></i>
                    </button>
                </div>
            </div>

            </div>
    </section>

    <script>
        const languages = {
            'ID': {
                'back-btn': 'KEMBALI',
                'prod-title': 'SEMUA PRODUK',
                'prod-hero': 'Varian Rasa Lumer',
                'prod-desc': 'Pilih rasa favoritmu, nikmati sensasi cokelatnya!'
            },
            'SUN': {
                'back-btn': 'MULANG',
                'prod-title': 'SADAYA PRODUK',
                'prod-hero': 'Rupa-rupa Rasa Lumer',
                'prod-desc': 'Pilih rasa karesep anjeun, raoskeun coklatna!'
            },
            'MDR': {
                'back-btn': 'ABHALI',
                'prod-title': 'SADHAJA PRODUK',
                'prod-hero': 'Bheriyan Rasa Lumer',
                'prod-desc': 'Pèlè rasa sè èkabunga, rassaaghi coklatta!'
            },
            'ENG': {
                'back-btn': 'BACK',
                'prod-title': 'ALL PRODUCTS',
                'prod-hero': 'Melted Flavor Variants',
                'prod-desc': 'Choose your favorite, enjoy the chocolate sensation!'
            },
            'AR': {
                'back-btn': 'رجوع',
                'prod-title': 'جميع المنتجات',
                'prod-hero': 'أنواع النكهات الذائبة',
                'prod-desc': 'اختر نكهتك المفضلة، واستمتع بإحساس الشوكولاتة!'
            }
        };

        function applyLanguage() {
            const savedLang = localStorage.getItem('selectedLanguage') || 'ID';
            const texts = languages[savedLang];

            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (texts[key]) el.innerText = texts[key];
            });

            // Atur arah teks untuk bahasa Arab
            document.body.dir = (savedLang === 'AR') ? 'rtl' : 'ltr';
        }

        // Jalankan saat halaman dibuka
        window.onload = applyLanguage;
    </script>
</body>
</html>
