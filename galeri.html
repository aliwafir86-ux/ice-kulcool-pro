<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri - Ice Kulcool</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Memastikan seluruh elemen menggunakan font Montserrat */
        * {
            font-family: 'Montserrat', sans-serif !important;
        }
        
        body { 
            background-color: #f5f3ff; /* bg-purple-50 */
        }

        /* Efek halus saat gambar di-hover */
        .img-container img {
            transition: transform 0.5s ease;
        }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-purple-800 font-bold italic hover:text-purple-600 transition flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> KEMBALI
            </a>
            <div class="font-bold text-purple-800 uppercase tracking-widest text-sm md:text-base">GALERI PRODUK</div>
            <div class="w-10 md:block hidden"></div> 
        </div>
    </nav>

    <section class="max-w-6xl mx-auto py-12 px-4">
        <h1 class="text-3xl font-extrabold text-center text-purple-900 mb-8 uppercase tracking-tight">Koleksi Lumer Kami</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            
            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok3.png" alt="Koleksi Ice Kulcool 3" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok4.png" alt="Koleksi Ice Kulcool 4" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok5.png" alt="Koleksi Ice Kulcool 5" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok6.png" alt="Koleksi Ice Kulcool 6" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok7.png" alt="Koleksi Ice Kulcool 7" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok8.png" alt="Koleksi Ice Kulcool 8" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok9.png" alt="Koleksi Ice Kulcool 9" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="bg-purple-200 rounded-2xl flex flex-col items-center justify-center h-64 text-purple-500 italic border-4 border-dashed border-purple-300">
                <i class="fa-regular fa-image text-3xl mb-2 opacity-50"></i>
                <p class="font-medium">Segera Hadir...</p>
            </div>

        </div>
    </section>

    <footer class="text-center py-12 text-gray-400 text-xs uppercase tracking-widest font-semibold">
        © 2026 Ice Kulcool Indonesia - Galeri
    </footer>

</body>
</html>
