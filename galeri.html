<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri - Ice Kulcool</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Memastikan seluruh elemen menggunakan font Montserrat */
        * {
            font-family: 'Montserrat', sans-serif !important;
        }
        
        body { 
            background-color: #f5f3ff; /* bg-purple-50 */
        }

        /* Efek halus saat gambar di-hover */
        .img-container img {
            transition: transform 0.5s ease;
        }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div data-key="gallery-title" class="font-bold text-purple-800 uppercase tracking-widest text-sm md:text-base text-center w-full">
            GALERI PRODUK
        </div>
    </div>
</nav>

    <section class="max-w-6xl mx-auto py-12 px-4">
        <h1 data-key="gallery-hero" class="text-3xl font-extrabold text-center text-purple-900 mb-8 uppercase tracking-tight">Koleksi Lumer Kami</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            
            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok3.jpg" alt="Koleksi Ice Kulcool 3" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok4.jpg" alt="Koleksi Ice Kulcool 4" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok5.jpg" alt="Koleksi Ice Kulcool 5" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok6.jpg" alt="Koleksi Ice Kulcool 6" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok7.jpg" alt="Koleksi Ice Kulcool 7" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok8.jpg" alt="Koleksi Ice Kulcool 8" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="img-container overflow-hidden rounded-2xl shadow-lg border-4 border-white">
                <img src="piscok9.jpg" alt="Koleksi Ice Kulcool 9" class="w-full h-64 object-cover hover:scale-110">
            </div>

            <div class="bg-purple-200 rounded-2xl flex flex-col items-center justify-center h-64 text-purple-500 italic border-4 border-dashed border-purple-300">
                <i class="fa-regular fa-image text-3xl mb-2 opacity-50"></i>
                <p data-key="coming-soon" class="text-center text-gray-500 mt-10">Segera Hadir...</p>
            </div>

        </div>
    </section>

    <footer class="text-center py-12 text-gray-400 text-xs uppercase tracking-widest font-semibold">
        © 2026 Ice Kulcool Indonesia - Galeri
    </footer>

<script>
    const languages = {
    'ID': { 
        'gallery-title': 'GALERI PRODUK', 
        'gallery-hero': 'Koleksi Lumer Kami', 
        'coming-soon': 'Segera Hadir...',
        'home-btn': 'BERANDA' 
    },
    'SUN': { 
        'gallery-title': 'GALERI PRODUK', 
        'gallery-hero': 'Kempelan Lumer Urang', 
        'coming-soon': 'Sakedap deui...',
        'home-btn': 'BUMI' 
    },
    'MDR': { 
        'gallery-title': 'GALERI PRODUK', 
        'gallery-hero': 'Kompolan Lomer kaulâ sadâjâh', 
        'coming-soon': 'Bhâkal dâtâng...',
        'home-btn': 'ROMA' 
    },
    'ENG': { 
        'gallery-title': 'PRODUCT GALLERY', 
        'gallery-hero': 'Our Melty Collection', 
        'coming-soon': 'Coming Soon...',
        'home-btn': 'HOME' 
    },
    'AR': { 
        'gallery-title': 'معرض المنتجات', 
        'gallery-hero': 'مجموعتنا الذائبة', 
        'coming-soon': 'قريباً...',
        'home-btn': 'رئيسي' 
    }
};

    function applyLanguage() {
        // Ambil bahasa dari storage, jika tidak ada default ke 'ID'
        const savedLang = localStorage.getItem('selectedLanguage') || 'ID';
        const texts = languages[savedLang];

        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (texts[key]) {
                el.innerText = texts[key];
            }
        });

        // Khusus untuk pengaturan RTL jika bahasa Arab
        document.body.dir = (savedLang === 'AR') ? 'rtl' : 'ltr';
    }

    // Jalankan fungsi saat halaman dibuka
    window.onload = applyLanguage;
</script>

<a href="index.html" class="fixed bottom-8 right-8 z-[999] bg-white text-purple-700 w-14 h-14 rounded-2xl shadow-[0_20px_50px_rgba(126,34,206,0.3)] flex items-center justify-center border border-purple-100 hover:bg-purple-700 hover:text-white hover:-translate-y-2 transition-all duration-300 group">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
    </svg>
    
    <span data-key="home-btn" class="absolute right-20 bg-purple-900 text-white text-[10px] px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-widest font-bold pointer-events-none shadow-xl border border-purple-400">
        BERANDA
    </span>
</a>
    
</body>
</html>
