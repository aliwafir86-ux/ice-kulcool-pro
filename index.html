<header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img src="logo1.png" alt="Logo" class="w-14 h-14 object-contain">
            <div class="hidden sm:block">
                <span class="block text-xl font-extrabold tracking-widest text-purple-900 uppercase">ICE KULCOOL</span>
                <span class="text-[10px] tracking-[0.3em] text-gray-400 uppercase">Premium Chocolate Treats</span>
            </div>
        </div>

        <nav class="hidden md:flex space-x-10">
            <a href="#home" class="nav-link">Beranda</a>
            <a href="#about" class="nav-link">Tentang</a>
            <a href="galeri.html" class="nav-link">Galeri</a>
            <a href="#menu" class="nav-link">Harga</a>
        </nav>

        <div class="flex items-center gap-4">
            <a href="https://wa.me/6285703393720" class="hidden md:block border-2 border-purple-800 text-purple-800 px-6 py-2 font-bold hover:bg-purple-800 hover:text-white transition-all uppercase text-xs tracking-widest">
                Contact Us
            </a>
            
            <button id="menu-open" class="md:hidden text-purple-900 text-2xl p-2 focus:outline-none">
                <i class="fa-solid fa-bars-staggered"></i>
            </button>
        </div>
    </div>
</header>

<div id="mobile-overlay" class="fixed inset-0 bg-purple-900/95 z-[100] transform translate-x-full transition-transform duration-500 ease-in-out">
    <div class="flex flex-col h-full p-8">
        <div class="flex justify-end mb-12">
            <button id="menu-close" class="text-white text-4xl focus:outline-none">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <nav class="flex flex-col gap-6 items-start">
            <a href="#home" class="mobile-nav-item">HOME</a>
            <a href="#about" class="mobile-nav-item">ABOUT US</a>
            <a href="galeri.html" class="mobile-nav-item">GALLERY</a>
            <a href="#menu" class="mobile-nav-item">PRODUCTS</a>
            <a href="https://wa.me/6285703393720" class="mobile-nav-item">CONTACT US</a>
        </nav>

        <div class="mt-auto pt-10 border-t border-purple-700">
            <p class="text-purple-300 text-xs tracking-widest mb-4 uppercase">Follow Us</p>
            <div class="flex gap-6 text-white text-2xl">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>
    </div>
</div>

<style>
    /* Tambahkan di dalam <style> Anda */
    .mobile-nav-item {
        color: white;
        font-size: 1.875rem; /* 3xl */
        font-weight: 700;
        letter-spacing: 0.1em;
        transition: 0.3s;
        border-left: 0px solid white;
    }
    .mobile-nav-item:hover {
        padding-left: 1rem;
        color: #facc15; /* Kuning aksen */
    }
</style>

<script>
    const menuOpen = document.getElementById('menu-open');
    const menuClose = document.getElementById('menu-close');
    const overlay = document.getElementById('mobile-overlay');
    const links = document.querySelectorAll('.mobile-nav-item');

    // Buka Menu
    menuOpen.addEventListener('click', () => {
        overlay.classList.remove('translate-x-full');
    });

    // Tutup Menu
    menuClose.addEventListener('click', () => {
        overlay.classList.add('translate-x-full');
    });

    // Otomatis tutup menu saat link diklik
    links.forEach(link => {
        link.addEventListener('click', () => {
            overlay.classList.add('translate-x-full');
        });
    });
</script>
