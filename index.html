<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Kulcool - Passion for Premium Chocolate</title>
    <link rel="icon" href="logo1.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { font-family: 'Montserrat', sans-serif; }
        html { scroll-behavior: smooth; }
        
        .nav-link {
            position: relative;
            font-weight: 500;
            color: #4a148c;
            transition: 0.3s;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: #7b1fa2;
            transition: 0.3s;
        }
        .nav-link:hover::after { width: 100%; }

        .hero-bg {
            background: linear-gradient(rgba(74, 20, 140, 0.4), rgba(74, 20, 140, 0.4)), url('piscok2.png');
            background-size: cover;
            background-position: center;
            height: 80vh;
        }

        .product-card {
            border: 1px solid #eee;
            transition: all 0.4s ease;
        }
        .product-card:hover {
            border-color: #7b1fa2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Navigasi Samping (Sidebar Pop-up) */
        .sidebar-item {
            color: #4a148c;
            font-size: 1.1rem;
            font-weight: 600;
            transition: 0.3s;
            padding: 12px 20px;
            display: block;
            border-radius: 8px;
        }
        .sidebar-item:hover {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }
    </style>
</head>
<body class="bg-white text-gray-900">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 grid grid-cols-3 items-center">
            
            <div class="flex justify-start">
                <button id="menu-open" class="text-purple-900 text-2xl p-2 focus:outline-none hover:bg-gray-100 rounded-lg transition">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
            </div>

            <div class="flex flex-col items-center text-center">
                <img src="logo1.png" alt="Logo" class="w-10 h-10 object-contain">
                <span class="block text-base font-extrabold tracking-widest text-purple-900 uppercase italic leading-none mt-1">ICE KULCOOL</span>
                <span class="text-[7px] tracking-[0.2em] text-gray-400 uppercase leading-none">Premium Chocolate Treats</span>
            </div>

            <div class="flex justify-end">
                <a href="https://wa.me/6285703393720" class="hidden sm:block border-2 border-purple-800 text-purple-800 px-4 py-1.5 font-bold hover:bg-purple-800 hover:text-white transition-all uppercase text-[10px] tracking-widest">
                    Contact Us
                </a>
            </div>
        </div>
    </header>

    <div id="menu-overlay" class="fixed inset-0 bg-black/40 z-[60] hidden opacity-0 transition-opacity duration-300"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white z-[70] shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <span class="font-bold text-purple-900">MENU</span>
                <button id="menu-close" class="text-gray-400 hover:text-purple-900 text-2xl focus:outline-none">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <nav class="flex flex-col gap-2">
                <a href="#home" class="sidebar-item">Beranda</a>
                <a href="#about" class="sidebar-item">Tentang</a>
                <a href="galeri.html" class="sidebar-item">Galeri</a>
                <a href="#menu" class="sidebar-item">Harga</a>
                <hr class="my-2 border-gray-100">
                <a href="https://wa.me/6285703393720" class="sidebar-item text-green-600"><i class="fa-brands fa-whatsapp mr-2"></i>Hubungi Kami</a>
            </nav>
        </div>
    </div>

    <section id="home" class="hero-bg flex items-center justify-center text-center text-white px-4">
        <div class="max-w-3xl">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6 leading-tight">THE ART OF MELTING CHOCOLATE</h1>
            <p class="text-lg md:text-xl font-light mb-10 tracking-wide">Menghadirkan sensasi kemewahan piscok lumer premium dengan kualitas bahan terbaik untuk setiap gigitan Anda.</p>
            <a href="#menu" class="bg-white text-purple-900 px-10 py-4 font-bold uppercase tracking-widest text-sm hover:bg-purple-100 transition shadow-2xl">
                Explore Products
            </a>
        </div>
    </section>

    <script>
        const menuOpen = document.getElementById('menu-open');
        const menuClose = document.getElementById('menu-close');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('menu-overlay');
        const links = document.querySelectorAll('.sidebar-item');

        function toggleMenu(isOpen) {
            if (isOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        menuOpen.onclick = () => toggleMenu(true);
        menuClose.onclick = () => toggleMenu(false);
        overlay.onclick = () => toggleMenu(false);

        links.forEach(link => {
            link.onclick = () => toggleMenu(false);
        });
    </script>
</body>
</html>
